services:
  - type: web
    name: agent-canvas-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: OLLAMA_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: agent-canvas-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
